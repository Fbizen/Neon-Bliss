<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Scrolling Object</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; overflow-x: hidden; }
        canvas { display: block; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <script>
        // Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting
        const light = new THREE.AmbientLight(0xffffff, 1);
        scene.add(light);

        // Load 3D Model
        const loader = new THREE.GLTFLoader();
        let model;
        loader.load('model.glb', function(gltf) {
            model = gltf.scene;
            model.position.set(0, 0, -5); // Adjust position
            scene.add(model);
        });

        // Camera Position
        camera.position.z = 5;

        // Scroll Event
        let lastScrollY = 0;
        const scrollThreshold = 200; // Adjust the scroll sensitivity
        const transitionTicks = 4;

        window.addEventListener('scroll', () => {
            let scrollY = window.scrollY;
            let rotation = (scrollY / scrollThreshold) * Math.PI * 2;
            if (model) model.rotation.y = rotation;

            lastScrollY = scrollY;
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
